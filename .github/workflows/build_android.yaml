name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get version name from gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | grep -oE '"[^"]+"' | tr -d '"' || echo "1.0")
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Get short commit SHA
        id: git
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get date time
        id: datetime
        run: echo "datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Modify app display name dynamically (optional)
        run: |
          TIMESTAMP=$(date +'%m%d_%H%M')
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            sed -i "s/ android:label=\"[^\"]*\"/ android:label=\"App_${TIMESTAMP}\"/" app/src/main/AndroidManifest.xml
            echo "✓ App display name modified to: App_${TIMESTAMP}"
          else
            echo "⚠ AndroidManifest.xml not found, skipping display name change"
          fi

      - name: Build
        run: ./gradlew assembleRelease

      - name: Rename APK with unique name
        run: |
          ORIGINAL_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="app_${{ steps.version.outputs.version_name }}_${{ steps.datetime.outputs.datetime }}_${{ steps.git.outputs.sha }}.apk"
          cp "$ORIGINAL_APK" "app/build/outputs/apk/release/$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "✓ APK renamed to: $NEW_NAME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app_${{ steps.version.outputs.version_name }}_${{ steps.datetime.outputs.datetime }}_${{ steps.git.outputs.sha }}
          path: ./Android/src/app/build/outputs/apk/release/*.apk
          retention-days: 30
